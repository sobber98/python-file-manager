<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}PyRunner Web Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        {% if current_user %}
        <nav class="navbar navbar-expand-lg app-navbar">
            <div class="container-fluid px-0">
                <a class="navbar-brand app-brand" href="{{ url_for('index') }}">PyRunner</a>
                <div class="d-flex align-items-center gap-3">
                    <span class="user-badge">{{ current_user }}</span>
                    <form action="{{ url_for('auth.logout') }}" method="post" class="m-0">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-outline-light">退出</button>
                    </form>
                </div>
            </div>
        </nav>
        {% endif %}

        <main class="container-fluid px-0">
            {% block body %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
