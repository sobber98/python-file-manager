# PyRunner 一键部署配置
# 使用方法：先编辑本文件，再执行 sudo bash deploy/install.sh

# 是否自动安装系统依赖（仅支持 Debian/Ubuntu）
INSTALL_SYSTEM_PACKAGES=true

# 服务与运行账号
SERVICE_NAME=pyrunner
RUN_USER=www-data
RUN_GROUP=www-data
PYTHON_BIN=python3
# 可选：SQLite 数据库文件路径；默认使用项目目录下的 data/app.db
# PYRUNNER_DB_PATH=/opt/python-file-manager/data/app.db

# 应用监听地址，通常配合 Nginx 保持 127.0.0.1
PYRUNNER_HOST=127.0.0.1
PYRUNNER_PORT=5000

# Gunicorn 参数
GUNICORN_WORKERS=1
GUNICORN_THREADS=4
GUNICORN_TIMEOUT=120
GUNICORN_GRACEFUL_TIMEOUT=30
GUNICORN_KEEPALIVE=5

# Web 管理员账号
ADMIN_USERNAME=admin
# 设为 auto 会在安装时生成随机密码并写入运行环境文件
ADMIN_PASSWORD=auto
# 设为 auto 会自动生成 64 位随机密钥
SECRET_KEY=auto

# 应用运行参数
MAX_UPLOAD_SIZE=10485760
LOG_MAX_BYTES=5242880
LOG_BACKUP_COUNT=3

# 进程监测与异常退出自动重启参数
AUTO_RESTART_DELAY_SECONDS=2
AUTO_RESTART_MAX_ATTEMPTS=3
AUTO_RESTART_RESET_AFTER_SECONDS=60
PROCESS_MONITOR_INTERVAL_SECONDS=5

# Nginx 反向代理配置
ENABLE_NGINX=true
NGINX_SITE_NAME=pyrunner
SERVER_NAME=_
NGINX_LISTEN_PORT=80
NGINX_CLIENT_MAX_BODY_SIZE=10m
DISABLE_DEFAULT_NGINX_SITE=true